<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Hardware NPI Ideation System Architecture</title>
  <desc id="desc">Architecture image showing global system flow and expanded subsystems for the Hardware NPI Ideation agentic engineering demo.</desc>
